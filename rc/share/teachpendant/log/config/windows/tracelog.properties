#log4cplus.rootLogger=STDOUT, TRACE, ALL_MSGS, TRACE_MSGS, DEBUG_INFO_MSGS, FATAL_MSGS
########################################################################################################
log4cplus.rootLogger=TRACE, CONSOLE, ALL_MSGS

# 修改ALL控制日志输出等级，依次为DEBUG/INFO/WARN/ERROR
log4cplus.logger.ALL_MSGS=ALL,ALL_MSGS

########################################################################################################
log4cplus.appender.CONSOLE=log4cplus::ConsoleAppender
log4cplus.appender.CONSOLE.Target=System.out
log4cplus.appender.CONSOLE.layout=log4cplus::PatternLayout
log4cplus.appender.CONSOLE.layout.ConversionPattern=%D{%Y/%m/%d %H:%M:%S,%q} [%-5t] [%-5p] - %m%n

########################################################################################################
log4cplus.appender.ALL_MSGS=log4cplus::RollingFileAppender
log4cplus.appender.ALL_MSGS.CreateDirs=true
log4cplus.appender.ALL_MSGS.File=path/trace_all.log
log4cplus.appender.ALL_MSGS.MaxFileSize=5MB
log4cplus.appender.ALL_MSGS.MaxBackupIndex=200
log4cplus.appender.ALL_MSGS.layout=log4cplus::TTCCLayout
log4cplus.appender.ALL_MSGS.layout=log4cplus::PatternLayout
log4cplus.appender.ALL_MSGS.layout.ConversionPattern=%D{%Y/%m/%d %H:%M:%S,%q} [%-5t] [%-5p] - %m%n
