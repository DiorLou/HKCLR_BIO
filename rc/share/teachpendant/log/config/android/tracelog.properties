#设置储存log文件的根目录
log4j.reset=true
log4j.Debug=WARN
log4j.threshold=NULL
#设置是否监听QDebug输出的字符串
log4j.handleQtMessages=false
#在运行中，是否监视此文件配置的变化
log4j.watchThisFile=false

#设置根Logger的输出log等级为All
#设置Log输出的几种输出源（appender）：console, daily, ALL_MSGS
log4j.rootLogger=ALL, console, ALL_MSGS

#设置终端打印记录器
log4j.appender.console=org.apache.log4j.ConsoleAppender
log4j.appender.console.target=STDOUT_TARGET
log4j.appender.console.layout=org.apache.log4j.TTCCLayout
log4j.appender.console.layout.dateFormat=yyyy/MM/dd HH:mm:ss,zzz
log4j.appender.console.layout.contextPrinting=true
log4j.appender.console.threshold=ALL

# 配置一个滚动文件记录器
log4j.appender.ALL_MSGS=org.apache.log4j.RollingFileAppender
log4j.appender.ALL_MSGS.threshold=ALL
log4j.appender.ALL_MSGS.File=path/trace_all.log
log4j.appender.ALL_MSGS.appendFile=true
log4j.appender.ALL_MSGS.maxFileSize=5MB
log4j.appender.ALL_MSGS.maxBackupIndex=200
log4j.appender.ALL_MSGS.layout=org.apache.log4j.TTCCLayout
log4j.appender.ALL_MSGS.layout=org.apache.log4j.PatternLayout
log4j.appender.ALL_MSGS.layout.ConversionPattern=%d{yyyy/MM/dd HH:mm:ss,zzz} [%-5t] [%-5p] - %m%n

# 给"LoggerObjectPrio"这个类的Logger定义log输出等级为Error，
# 给"LoggerObjectPrio"这个类的Logger定义log输出源：daily, console
#log4j.logger.LoggerObjectPrio=ERROR, ALL_MSGS
#设置为false，表示"LoggerObjectPrio"这个类的logger不继承的rootLogger输出源（appender）
#log4j.additivity.LoggerObjectPrio=false
