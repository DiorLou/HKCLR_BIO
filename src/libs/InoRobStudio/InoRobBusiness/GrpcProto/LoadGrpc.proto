syntax = "proto3";
import "google/protobuf/empty.proto";
import "google/protobuf/wrappers.proto";
import "GlobalDataTypesGrpc.proto";
package InoRobBusinessGrpc;

// 读取负载参数响应
message LoadGrpc_GetLoadParam_Response
{
    bool ret = 1;               // 是否获取成功
    LoadData_Grpc loadData = 2; // 返回负载参数
}

// 设置负载参数请求
message LoadGrpc_SetLoadParam_Request
{
    uint32 loadNo = 1;              // 负载号
    LoadData_Grpc loadData = 2;     // 负载参数
}

// 工件
service LoadGrpc {
    // 设定当前负载号
    rpc SetCurrentId(google.protobuf.UInt32Value) returns (google.protobuf.BoolValue) {}
    // 读取负载参数
    rpc GetLoadParam(google.protobuf.UInt32Value) returns (LoadGrpc_GetLoadParam_Response) {}
    // 设置负载参数
    rpc SetLoadParam(LoadGrpc_SetLoadParam_Request) returns (google.protobuf.BoolValue) {}
}