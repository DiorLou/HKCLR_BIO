syntax = "proto3";
import "google/protobuf/empty.proto";
import "google/protobuf/wrappers.proto";
package InoRobBusinessGrpc;

// 用户模式类型
enum EUSER_MODE_Grpc
{
    EUSER_MODE_Grpc_UnuseDefault = 0;
    USER_UNKNOW_Grpc = -1;
    USER_CUSTOMER_Grpc = 1;
    USER_EDIT_Grpc = 2;
    USER_MANAGE_Grpc = 3;
    USER_FACTORY_Grpc = 4;
}

// 开发者调试类型
enum DEVELOPER_DEBUG_Grpc
{
    DEVELOPER_CLOSE_Grpc = 0;
    DEVELOPER_OPEN_Grpc = 1;
}

// 权限密码
message USER_PWD_Grpc
{
    EUSER_MODE_Grpc eUserMode = 1;
    bytes szPwd = 2;
}

// 获取当前用户模式响应
message getCurrentLoginUserMode_Response
{
    EUSER_MODE_Grpc eUSER_MODE = 1;
}
// 用户登录请求
message userLogin_Request
{
    EUSER_MODE_Grpc eUSER_MODE = 1;
    string pwd = 2;
}
// 修改用户密码请求
message modifyUserPassWord_Request
{
    EUSER_MODE_Grpc eUSER_MODE = 1;
    string pwd = 2;
}
// 设置开发者调试状态请求
message setDevelopDebugState_Request
{
    DEVELOPER_DEBUG_Grpc developer_DEBUG = 1;
}
// 获取开发者调试状态响应
message getDevelopDebugState_Response
{
    DEVELOPER_DEBUG_Grpc developer_DEBUG = 1;
}
// 验证用户密码请求
message verifyUserPassword_Request
{
    EUSER_MODE_Grpc eUSER_MODE = 1;
    string pwd = 2;
}
// 读取管理模式下密码响应
message readManagerPwd_Response
{
    int32 retCode = 1;
    USER_PWD_Grpc user_PWD = 2;
}

// 用户
service UserGrpc {

    /*!
     * \brief 获取当前用户模式
     * \return 当前用户模式
     */
    rpc getCurrentLoginUserMode(google.protobuf.Empty) returns (getCurrentLoginUserMode_Response) {}

    /*!
     * \brief 用户登录
     * \param mode 用户模式
     * \param pwd 用户密码
     * \return 0-成功
     */
    rpc userLogin(userLogin_Request) returns (google.protobuf.Int32Value) {}

    /*!
     * \brief 获取登录状态
     * \return true-已登录
     */
    rpc getLoginState(google.protobuf.Empty) returns (google.protobuf.BoolValue) {}

    /*!
     * \brief 注销当前登录的用户
     * \return 0-成功
     */
    rpc userLogOut(google.protobuf.Empty) returns (google.protobuf.Int32Value) {}

    /*!
     * \brief 修改用户密码
     * \param mode 用户模式
     * \param pwd 用户密码
     * \return 0-成功
     */
    rpc modifyUserPassWord(modifyUserPassWord_Request) returns (google.protobuf.Int32Value) {}

    /**
     * @brief 设置开发者调试状态
     * @param state 状态
     * @return 0-成功
     */
    rpc setDevelopDebugState(setDevelopDebugState_Request) returns (google.protobuf.Int32Value) {}

    /**
     * @brief 获取开发者调试状态
     * @return 状态信息
     */
    rpc getDevelopDebugState(google.protobuf.Empty) returns (getDevelopDebugState_Response) {}

    /**
     * @brief 验证用户密码
     * @param mode 用户类型
     * @param pwd 密码
     * @return true验证通过 false验证不通过
     */
    rpc verifyUserPassword(verifyUserPassword_Request) returns (google.protobuf.BoolValue) {}

    /**
     * @brief 读取管理模式下密码
     * @USER_PWD 返回值带密码
     * @return 0读取成功 非0读取失败
     */
    rpc readManagerPwd(google.protobuf.Empty) returns (readManagerPwd_Response) {}
}